# Docker Compose for local development
# Use this to run only PostgreSQL and Redis locally
# The backend will run on your host machine (not in Docker)
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: deskhab-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: desktophab
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deskhab-dev-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: deskhab-redis-dev
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deskhab-dev-network
    restart: unless-stopped

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  deskhab-dev-network:
    driver: bridge
